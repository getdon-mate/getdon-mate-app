name: vercel-deploy

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Verify web build prerequisites
        run: pnpm run ci:web

      - name: Check Vercel credentials
        id: vercel-creds
        run: |
          if [[ -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" && -n "$VERCEL_TOKEN" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "::warning::VERCEL_* secrets are not configured. Preview deploy step will be skipped."

      - name: Deploy preview to Vercel
        if: steps.vercel-creds.outputs.available == 'true'
        run: pnpm run deploy:vercel:preview

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Verify web build prerequisites
        run: pnpm run ci:web

      - name: Check Vercel credentials
        id: vercel-creds
        run: |
          if [[ -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" && -n "$VERCEL_TOKEN" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "::warning::VERCEL_* secrets are not configured. Production deploy step will be skipped."

      - name: Deploy production to Vercel
        if: steps.vercel-creds.outputs.available == 'true'
        run: pnpm run deploy:vercel:production
